# Zerodha Daily Data Collector
# Runs automatically every day at 4 PM IST (10:30 AM UTC)
# Also can be triggered manually from GitHub Actions tab

name: Daily Data Collection

on:
  # Scheduled run - 4 PM IST = 10:30 AM UTC
  schedule:
    - cron: '30 10 * * 1-5'  # Monday to Friday at 10:30 UTC (4 PM IST)
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to collect (1-60)'
        required: false
        default: '3'
      historical:
        description: 'Collect 60 days historical data'
        required: false
        type: boolean
        default: false
      stock_set:
        description: 'Which stocks to collect'
        required: false
        type: choice
        default: 'nifty50'
        options:
          - nifty50
          - top100
          - top200
          - top500
          - all_nse

# Required for creating releases
permissions:
  contents: write

env:
  ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
  ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
  ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas pyotp tqdm python-telegram-bot
      
      - name: Download existing database
        continue-on-error: true
        run: |
          mkdir -p data
          # Try to download from latest release
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep "browser_download_url.*zerodha_data.db" | cut -d '"' -f 4)
          if [ -n "$LATEST_RELEASE" ]; then
            echo "Downloading existing database..."
            curl -L -o data/zerodha_data.db "$LATEST_RELEASE"
            echo "Database downloaded!"
          else
            echo "No existing database found, starting fresh"
          fi
      
      - name: Collect data
        run: |
          STOCK_SET="${{ github.event.inputs.stock_set || 'nifty50' }}"
          DAYS="${{ github.event.inputs.days || '3' }}"
          HISTORICAL="${{ github.event.inputs.historical }}"
          
          # Build command
          CMD="python cloud_collector.py --days $DAYS"
          
          if [ "$HISTORICAL" == "true" ]; then
            CMD="$CMD --historical"
          fi
          
          # Stock set options
          case $STOCK_SET in
            "all_nse")
              CMD="$CMD --all-nse"
              ;;
            "top100")
              CMD="$CMD --top 100"
              ;;
            "top200")
              CMD="$CMD --top 200"
              ;;
            "top500")
              CMD="$CMD --top 500"
              ;;
            *)
              # Default: nifty50 (no extra flag needed)
              ;;
          esac
          
          echo "Running: $CMD"
          $CMD
      
      - name: Get database stats
        run: |
          python -c "
          import sqlite3
          import os
          db = sqlite3.connect('data/zerodha_data.db')
          cur = db.cursor()
          cur.execute('SELECT COUNT(*) FROM ohlcv')
          total = cur.fetchone()[0]
          cur.execute('SELECT COUNT(DISTINCT symbol) FROM ohlcv')
          symbols = cur.fetchone()[0]
          size = os.path.getsize('data/zerodha_data.db') / (1024*1024)
          print(f'Records: {total:,}')
          print(f'Symbols: {symbols}')
          print(f'Size: {size:.2f} MB')
          "
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: data-${{ github.run_number }}
          name: Data Update ${{ github.run_number }}
          body: |
            Automated data collection
            Date: ${{ github.event.repository.updated_at }}
          files: |
            data/zerodha_data.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: zerodha-data-${{ github.run_number }}
          path: data/zerodha_data.db
          retention-days: 30
